<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auth Vault Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.tab-btn.active { background-color: white; border-bottom-color: white; color: #2563eb; }</style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <nav class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🛡️</span>
            <h1 class="font-bold text-xl tracking-wide">Auth Vault <span class="text-slate-500 text-sm font-normal">Admin</span></h1>
        </div>
        <button id="logout-btn" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded text-sm font-semibold transition">Sign Out</button>
    </nav>

    <div class="max-w-6xl mx-auto mt-8 p-4">
        
        <div class="flex border-b border-gray-300 mb-6 space-x-2">
            <button id="tab-users" class="tab-btn active px-6 py-3 font-semibold text-gray-600 border-t border-l border-r border-transparent rounded-t-lg hover:text-blue-600">
                Users Management
            </button>
            <button id="tab-websites" class="tab-btn px-6 py-3 font-semibold text-gray-600 border-t border-l border-r border-transparent rounded-t-lg hover:text-blue-600">
                Website Whitelist
            </button>
        </div>

        <div id="panel-users" class="bg-white p-6 shadow-sm rounded-b-lg rounded-tr-lg border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">System Users</h2>
                <button onclick="loadUsers()" class="text-sm text-blue-600 hover:underline">Refresh List</button>
            </div>
            <div id="users-list" class="space-y-3">
                <div class="animate-pulse flex space-x-4"><div class="h-12 bg-gray-200 rounded w-full"></div></div>
            </div>
        </div>

        <div id="panel-websites" class="hidden bg-white p-6 shadow-sm rounded-b-lg rounded-tr-lg border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-6">Allowed Domains</h2>
            
            <div class="flex gap-3 mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <input id="site-name" type="text" placeholder="Site Name (e.g. My Blog)" class="flex-1 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="site-domain" type="text" placeholder="Domain (e.g. blog.netlify.app)" class="flex-1 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="add-site-btn" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded font-semibold transition">Add Domain</button>
            </div>

            <div id="websites-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script type="module" src="/src/admin.js"></script>
</body>
</html>
