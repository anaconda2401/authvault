<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Vault</title>
    <style>
        /* --- BASE STYLES (Mobile First & Desktop) --- */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            padding: 20px; /* Prevents card from hitting screen edges on small devices */
            box-sizing: border-box;
        }

        .login-card {
            background: #1e1e1e;
            padding: 2.5rem 3rem; /* Extra padding on the sides for desktop */
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 400px; /* Slightly larger for laptop screens */
            box-sizing: border-box; 
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center; /* Centers the title for better symmetry */
            font-size: 1.75rem;
        }

        input, button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px; /* Replaced margin-top with margin-bottom for better flow */
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }

        input {
            background: #2d2d2d;
            color: #ffffff;
            border: 1px solid #404040;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            background: #333333; /* Slight brightness bump on focus */
        }

        button {
            background: #4CAF50;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 0; /* Remove bottom margin for the last element */
        }

        button:hover {
            background: #45a049;
        }

        button:active {
            transform: scale(0.98); /* Adds a subtle 'click' indent effect */
        }

        /* --- MOBILE RESPONSIVE TWEAKS --- */
        @media (max-width: 600px) {
            .login-card {
                padding: 2rem 1.5rem; /* Reduces inner padding to save space on phones */
                box-shadow: 0 4px 16px rgba(0,0,0,0.6); 
            }
            
            h2 {
                font-size: 1.5rem; /* Scales down title slightly */
            }

            input, button {
                padding: 14px 16px; /* Taller tap targets for thumbs */
                font-size: 16px; /* Strict 16px to prevent iOS Safari auto-zoom */
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Auth Vault</h2>
        <form action="/.netlify/functions/login" method="POST">
            <input type="hidden" name="redirect_uri" id="redirect_uri">
            <input type="email" name="email" placeholder="admin@example.com" required>
            <input type="password" name="password" placeholder="Passphrase" required>
            <button type="submit">Authenticate</button>
        </form>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('redirect_uri').value = urlParams.get('redirect_uri') || 'https://default.vercel.app';
    </script>
</body>
</html>
