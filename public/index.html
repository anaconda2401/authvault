<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Vault</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="theme-color" content="#121212"> <style>
        /* --- BASE STYLES (Mobile First & Desktop) --- */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            padding: 20px; 
            box-sizing: border-box;
        }

        .login-card {
            background: #1e1e1e;
            padding: 2.5rem 3rem; 
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 400px; 
            box-sizing: border-box; 
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center; 
            font-size: 1.75rem;
        }

        input, button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px; 
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }

        input {
            background: #2d2d2d;
            color: #ffffff;
            border: 1px solid #404040;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            background: #333333; 
        }

        button {
            background: #4CAF50;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 0; 
        }

        button:hover {
            background: #45a049;
        }

        button:active {
            transform: scale(0.98); 
        }

        /* --- MOBILE RESPONSIVE TWEAKS --- */
        @media (max-width: 600px) {
            .login-card {
                padding: 2rem 1.5rem; 
                box-shadow: 0 4px 16px rgba(0,0,0,0.6); 
            }
            
            h2 {
                font-size: 1.5rem; 
            }

            input, button {
                padding: 14px 16px; 
                font-size: 16px; 
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Auth Vault</h2>
        <form action="/.netlify/functions/login" method="POST">
            <input type="hidden" name="redirect_uri" id="redirect_uri">
            <input type="email" name="email" placeholder="admin@example.com" required>
            <input type="password" name="password" placeholder="Passphrase" required>
            <button type="submit">Authenticate</button>
        </form>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('redirect_uri').value = urlParams.get('redirect_uri') || 'https://default.vercel.app';
    </script>
</body>
</html>
